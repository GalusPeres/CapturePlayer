name: Release Build

# Builds Windows (nsis + portable), Linux (AppImage x64) and macOS (dmg, Apple
# Silicon) packages. Pushing a v* tag publishes them to a draft GitHub release;
# manual runs upload the packages as workflow artifacts instead.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and electron bundles
        run: npm run build

      - name: Package and publish to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS runners have no signing certificate - ship unsigned builds.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Package without publishing
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: captureplayer-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.AppImage
            dist/*.dmg
          if-no-files-found: error
